name: CI
on:
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: scaffold
        run: |
          if [ -f package.json ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-node@v4
        if: steps.scaffold.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.scaffold.outputs.exists == 'true'
      - run: npm test
        if: steps.scaffold.outputs.exists == 'true'
      - run: npm run build
        if: steps.scaffold.outputs.exists == 'true'
      - name: Pre-scaffold — passing trivially
        if: steps.scaffold.outputs.exists == 'false'
        run: echo "No package.json yet; skipping."
