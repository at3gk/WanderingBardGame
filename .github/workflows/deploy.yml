name: Test, build, deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.scaffold.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: scaffold
        run: |
          if [ -f package.json ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-node@v4
        if: steps.scaffold.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.scaffold.outputs.exists == 'true'
      - run: npm test          # red tests block the deploy job below
        if: steps.scaffold.outputs.exists == 'true'
      - run: npm run build
        if: steps.scaffold.outputs.exists == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.scaffold.outputs.exists == 'true'
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
