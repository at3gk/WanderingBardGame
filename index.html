<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Wandering Bard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1621'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23c98a5b'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23e8d9c0'/%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1621;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        /* `100vh` on mobile Safari/Chrome is sized against the *largest*
           possible viewport (address bar collapsed), not what's actually
           visible on load (address bar shown) — the classic mobile "100vh"
           gap, same family of "real mobile viewport" bug as the touch-action
           and phantom-scroll fixes above. `100dvh` (dynamic viewport height)
           tracks the currently-visible area as browser chrome shows/hides;
           the plain `100vh` above it is a fallback for browsers that don't
           support `dvh` (unknown-value declarations are simply ignored).
           https://caniuse.com/viewport-unit-variants — supported in every
           evergreen mobile/desktop browser this game targets. */
        height: 100vh;
        height: 100dvh;
        /* Rapid/double taps are the entire input model here (ROADMAP task 3),
           so the usual mobile-browser gestures that key off tap timing —
           double-tap-to-zoom, pinch-zoom, long-press text-selection callout —
           fight the game instead of doing nothing. user-scalable=no in the
           viewport meta tag alone doesn't reliably stop this on modern
           mobile Safari, which loosened that meta flag for accessibility. */
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* <canvas> defaults to display: inline, so it sits on a text baseline
         and reserves a few px below itself for descenders — the classic
         "phantom scrollbar" gap. That pushes the page a few px taller than
         the viewport, making it vertically scrollable even though #game is
         sized to exactly fill it. */
      #game canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
